server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # long-cache hashed Astro assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Astro emits directory-style routes (/about/ -> /about/index.html);
    # also serves files like /feed.xml and /sitemap-index.xml directly.
    # HTML/feeds must always revalidate so a new deploy is picked up
    # immediately (they reference content-hashed assets); the hashed
    # assets above stay cached for a year.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "no-cache" always;
    }

    # custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
